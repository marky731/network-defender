# Default credentials for common services
# WARNING: Only use in authorized testing environments
credentials:
  ssh:
    port: 22
    pairs:
      - username: admin
        password: admin
      - username: root
        password: root
      - username: root
        password: toor
      - username: admin
        password: password
      - username: user
        password: user
      - username: test
        password: test

  ftp:
    port: 21
    pairs:
      - username: anonymous
        password: anonymous
      - username: admin
        password: admin
      - username: ftp
        password: ftp
      - username: user
        password: user

  mysql:
    port: 3306
    pairs:
      - username: root
        password: root
      - username: root
        password: ""
      - username: admin
        password: admin

  snmp:
    port: 161
    community_strings:
      - public
      - private
      - community
      - admin
      - snmp

  redis:
    port: 6379
    passwords:
      - ""
      - redis
      - admin
